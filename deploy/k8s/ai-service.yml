apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: travel-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai
          image: ghcr.io/wovoemj/1/ai-core:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: travel-ai-config
            - secretRef:
                name: travel-ai-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: travel-ai
spec:
  selector:
    app: ai-service
  ports:
    - port: 8000
      targetPort: 8000
