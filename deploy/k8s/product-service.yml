apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: travel-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product
          image: ghcr.io/wovoemj/1/product-service:latest
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: travel-ai-config
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: travel-ai
spec:
  selector:
    app: product-service
  ports:
    - port: 8082
      targetPort: 8082
