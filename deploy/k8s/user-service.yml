apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: travel-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user
          image: ghcr.io/wovoemj/1/user-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: travel-ai-config
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: travel-ai
spec:
  selector:
    app: user-service
  ports:
    - port: 8081
      targetPort: 8081
