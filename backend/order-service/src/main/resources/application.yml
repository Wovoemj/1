spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:travel_ai}
    username: ${DB_USER:travel}
    password: ${DB_PASSWORD:travel123}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8083

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# 订单超时配置
order:
  expire:
    minutes: 30
  auto-confirm:
    days: 7

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
